<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laboratorio de Epidemiología Espacial</title>
  <link rel="icon" href="logo.png" type="image/png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,800;1,9..144,300&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy:  { DEFAULT: '#1e3a8a', light: '#2d52b8', dark: '#152a66' },
            sand:  '#f5f2ed',
            ink:   '#111827',
            muted: '#6b7280'
          },
          fontFamily: {
            display: ['Fraunces', 'Georgia', 'serif'],
            body:    ['DM Sans', 'sans-serif']
          }
        }
      }
    }
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; background: #fff; color: #111827; }
    .font-display { font-family: 'Fraunces', Georgia, serif; }

    .nav-link { position: relative; }
    .nav-link::after {
      content: ''; position: absolute; bottom: -2px; left: 0;
      width: 0; height: 1.5px; background: #1e3a8a;
      transition: width .25s ease;
    }
    .nav-link:hover::after, .nav-link.active::after { width: 100%; }

    .hero-bg {
      background-color: #fff;
      background-image:
        radial-gradient(circle at 72% 20%, rgba(30,58,138,.06) 0%, transparent 55%),
        radial-gradient(circle at 15% 80%, rgba(30,58,138,.04) 0%, transparent 45%);
    }
    .hero-grid {
      background-image:
        linear-gradient(rgba(30,58,138,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(30,58,138,.04) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .card-hover { transition: transform .2s ease, box-shadow .2s ease; }
    .card-hover:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(30,58,138,.1); }

    .section-fade { opacity: 0; transform: translateY(20px); transition: opacity .5s ease, transform .5s ease; }
    .section-fade.visible { opacity: 1; transform: none; }

    #mobile-menu { display: none; }
    #mobile-menu.open { display: flex; }

    .tag { display: inline-block; font-size: .7rem; font-weight: 600; letter-spacing: .04em; padding: 2px 8px; border-radius: 999px; }

    .member-btn {
      display: flex; align-items: center; justify-content: center; gap: 5px;
      font-size: .7rem; font-weight: 500; color: #6b7280;
      border: 1px solid #e5e7eb; border-radius: 6px; padding: 5px 10px;
      text-decoration: none; white-space: nowrap;
      transition: color .2s, border-color .2s;
    }
    .member-btn:hover { color: #1e3a8a; border-color: rgba(30,58,138,.3); }

    /* Footer social buttons */
    .social-btn {
      width: 40px; height: 40px; border-radius: 8px;
      border: 1px solid rgba(255,255,255,.15);
      display: flex; align-items: center; justify-content: center;
      transition: border-color .2s, background .2s;
      color: white; text-decoration: none;
    }
    .social-btn:hover { border-color: rgba(255,255,255,.4); background: rgba(255,255,255,.05); }
    .social-btn svg { width: 20px; height: 20px; fill: none; stroke: white; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    /* RG icon uses fill not stroke */
    .social-btn svg.rg-svg { stroke: none; fill: white; }
  </style>
</head>

<body>

<!-- ╔══════════════════════════════════════════╗ -->
<!-- ║  NAVEGACIÓN                              ║ -->
<!-- ╚══════════════════════════════════════════╝ -->
<header id="navbar" class="fixed top-0 inset-x-0 z-50 bg-white/90 backdrop-blur border-b border-gray-100 transition-shadow duration-300">
  <nav class="max-w-6xl mx-auto px-6 h-20 flex items-center justify-between">
    <a href="#inicio" class="flex items-center gap-3 shrink-0">
      <img id="nav-logo" src="logo.png" alt="Logo" class="h-14 w-auto">
    </a>
    <ul id="nav-links" class="hidden md:flex items-center gap-8 text-sm font-medium text-ink"></ul>
    <button id="menu-btn" class="md:hidden p-2 text-ink" aria-label="Menú">
      <i data-lucide="menu" class="w-5 h-5"></i>
    </button>
  </nav>
  <div id="mobile-menu" class="md:hidden flex-col border-t border-gray-100 bg-white px-6 pb-4 gap-3 text-sm font-medium text-ink"></div>

     SCRIPTS

<script src="data.js"></script>
<script>
const $  = id => document.getElementById(id);
const el = (tag, cls, html) => {
  const e = document.createElement(tag);
  if (cls)  e.className = cls;
  if (html) e.innerHTML = html;
  return e;
};

// Scroll shadow
window.addEventListener('scroll', () => {
  $('navbar').classList.toggle('shadow-sm', window.scrollY > 10);
});

// Active nav
const sectionIds = ['inicio','investigacion','integrantes','proyectos','publicaciones','Recursos'];
window.addEventListener('scroll', () => {
  const y = window.scrollY + 120;
  sectionIds.forEach(id => {
    const sec  = document.getElementById(id);
    const link = document.querySelector(`[data-section="${id}"]`);
    if (!sec || !link) return;
    link.classList.toggle('active', sec.offsetTop <= y && sec.offsetTop + sec.offsetHeight > y);
  });
});

// Mobile menu
$('menu-btn').addEventListener('click', () => $('mobile-menu').classList.toggle('open'));

// Scroll animations
const obs = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); }});
}, { threshold: 0.1 });
document.querySelectorAll('.section-fade').forEach(e => obs.observe(e));

// ═════════════════════════════════════════════
//  RENDER
// ═════════════════════════════════════════════
const D = SITE_DATA;

// ── LOGOS ─────────────────────────────────────
$('nav-logo').src  = D.logos.nav  || 'logo.png';
$('hero-logo').src = D.logos.hero || D.logos.nav || 'logo.png';

// Footer logo — dibujado en canvas para evitar el fondo de tablero
// Usamos compositing: dibuja el PNG en negro/blanco sobre fondo transparente del canvas
function drawFooterLogo(src) {
  const canvas = $('footer-canvas');
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    // Escalar manteniendo proporción, altura máxima 80px
    const ratio = img.width / img.height;
    canvas.height = 80;
    canvas.width  = Math.round(80 * ratio);
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    // Dibujar imagen normal
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    // Aplicar efecto: convertir a blanco usando compositing
    ctx.globalCompositeOperation = 'source-in';
    ctx.fillStyle = 'white';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  };
  img.onerror = () => {
    // Si falla canvas, mostrar img normal con invert
    canvas.style.display = 'none';
    const fallback = document.createElement('img');
    fallback.src = src;
    fallback.style.cssText = 'height:80px;width:auto;display:block;margin-bottom:20px;filter:invert(1);';
    canvas.parentNode.insertBefore(fallback, canvas);
  };
  img.src = src;
}
drawFooterLogo(D.logos.footer || D.logos.nav || 'logo.png');

// ── NAV ───────────────────────────────────────
const sectionMap = {
  'Inicio':'inicio','Integrantes':'integrantes','Proyectos':'proyectos',
  'Publicaciones':'publicaciones','Recursos':'Recursos'
};
D.nav.links.forEach(link => {
  const sid = sectionMap[link.label] || link.href.replace('#','');
  const li = el('li');
  const a  = el('a','nav-link text-ink/70 hover:text-ink transition-colors pb-0.5', link.label);
  a.href = link.href; a.setAttribute('data-section', sid);
  li.appendChild(a); $('nav-links').appendChild(li);
  const ma = el('a','py-2 border-b border-gray-100 text-ink/70', link.label);
  ma.href = link.href;
  ma.addEventListener('click', () => $('mobile-menu').classList.remove('open'));
  $('mobile-menu').appendChild(ma);
});

// ── HERO ──────────────────────────────────────
$('hero-tag').textContent           = D.hero.tag;
$('hero-title').textContent         = D.hero.title;
$('hero-subtitle').textContent      = D.hero.subtitle;
$('hero-cta-primary').textContent   = D.hero.cta_primary.label;
$('hero-cta-primary').href          = D.hero.cta_primary.href;
$('hero-cta-secondary').textContent = D.hero.cta_secondary.label;
$('hero-cta-secondary').href        = D.hero.cta_secondary.href;
D.hero.stats.forEach(s => {
  $('hero-stats').appendChild(el('div','',`
    <span class="font-display text-3xl font-bold text-navy">${s.value}</span>
    <p class="text-xs text-muted mt-1 uppercase tracking-wider">${s.label}</p>`));
});

// ── LÍNEAS DE INVESTIGACIÓN ───────────────────
$('rl-title').textContent    = D.research_lines.title;
$('rl-subtitle').textContent = D.research_lines.subtitle;
D.research_lines.items.forEach(item => {
  $('rl-grid').appendChild(el('div','bg-white rounded-xl p-8 card-hover',`
    <div class="w-14 h-14 rounded-xl bg-navy/8 flex items-center justify-center mb-5">
      <i data-lucide="${item.icon}" class="w-7 h-7 text-navy"></i>
    </div>
    <h3 class="font-semibold text-ink mb-2 text-base">${item.title}</h3>
    <p class="text-sm text-muted leading-relaxed">${item.desc}</p>`));
});

// SVGs inline para botones de integrantes (no dependen de Lucide)
const svgScholar = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:13px;height:13px;flex-shrink:0"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>`;
const svgLinkedin = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:13px;height:13px;flex-shrink:0"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>`;
const svgRG       = `<svg viewBox="0 0 24 24" style="width:13px;height:13px;flex-shrink:0"><text x="1" y="16" font-family="Georgia,serif" font-size="13" font-weight="bold" fill="currentColor">R</text><text x="10" y="12" font-family="Georgia,serif" font-size="9" font-weight="bold" fill="currentColor">G</text></svg>`;

// ── INTEGRANTES ───────────────────────────────
$('team-title').textContent    = D.team.title;
$('team-subtitle').textContent = D.team.subtitle;
D.team.members.forEach(m => {
  const card = el('div','flex flex-col items-center text-center card-hover rounded-xl p-6 border border-gray-100');
  card.innerHTML = `
    <img src="${m.photo}" alt="${m.name}" class="w-24 h-24 rounded-full object-cover mb-4 ring-2 ring-navy/10">
    <h3 class="font-semibold text-ink text-sm">${m.name}</h3>
    <p class="text-navy text-xs font-medium mt-0.5">${m.role}</p>
    <p class="text-muted text-xs mt-1 mb-5 leading-relaxed">${m.area}</p>`;

  const btns = el('div','flex gap-2 mt-auto flex-wrap justify-center');

  const makeBtn = (href, icon, label, title) => {
    const a = document.createElement('a');
    a.href = href || '#'; a.target = '_blank'; a.title = title;
    a.className = 'member-btn';
    a.innerHTML = `${icon}<span>${label}</span>`;
    return a;
  };

  btns.appendChild(makeBtn(m.researchgate, svgRG,       'ResearchGate', 'ResearchGate'));
  btns.appendChild(makeBtn(m.scholar,      svgScholar,  'Scholar',      'Google Scholar'));
  btns.appendChild(makeBtn(m.linkedin,     svgLinkedin, 'LinkedIn',     'LinkedIn'));

  card.appendChild(btns);
  $('team-grid').appendChild(card);
});

// ── PROYECTOS ─────────────────────────────────
$('proj-title').textContent    = D.projects.title;
$('proj-subtitle').textContent = D.projects.subtitle;
D.projects.items.forEach(p => {
  const isActive = p.status === 'En curso';
  $('proj-list').appendChild(el('div','bg-white rounded-xl p-7 card-hover border border-gray-100',`
    <div class="flex flex-wrap items-center gap-2 mb-3">
      <span class="tag ${isActive?'bg-emerald-50 text-emerald-700':'bg-gray-100 text-gray-600'}">${p.status}</span>
      <span class="text-xs text-muted">${p.year}</span>
      <span class="tag bg-navy/8 text-navy/80">${p.funder||''}</span>
      ${p.role?`<span class="tag bg-amber-50 text-amber-700">${p.role}</span>`:''}
    </div>
    <h3 class="font-semibold text-ink mb-2 leading-snug">${p.title}</h3>
    <p class="text-sm text-muted leading-relaxed mb-4">${p.desc}</p>
    <div class="flex flex-wrap gap-2">${p.tags.map(t=>`<span class="tag bg-navy/6 text-navy/70">${t}</span>`).join('')}</div>`));
});

// ── PUBLICACIONES ─────────────────────────────
$('pub-title').textContent    = D.publications.title;
$('pub-subtitle').textContent = D.publications.subtitle;
$('pub-scholar').href         = D.publications.scholar_url;
D.publications.items.forEach((p, idx) => {
  const num    = p.number !== undefined ? p.number : idx + 1;
  const href   = p.link || p.doi || '#';
  const volStr = p.volume ? ` · ${p.volume}` : '';
  $('pub-list').appendChild(el('div','flex gap-5 items-start p-5 rounded-xl border border-gray-100 card-hover bg-white',`
    <div class="shrink-0 w-12 h-12 rounded-lg bg-navy/8 flex items-center justify-center">
      <span class="font-display text-lg font-bold text-navy">${num}</span>
    </div>
    <div class="flex-1 min-w-0">
      <p class="text-xs text-muted mb-0.5">${p.authors}</p>
      <h3 class="font-semibold text-sm text-ink leading-snug mb-1">${p.title}</h3>
      <p class="text-xs text-navy/80 font-medium">${p.journal}${volStr}</p>
      <div class="flex flex-wrap gap-1.5 mt-2">
        ${p.tags.map(t=>`<span class="tag bg-navy/6 text-navy/80">${t}</span>`).join('')}
        <a href="${href}" target="_blank" class="tag bg-gray-100 text-gray-600 hover:bg-navy/10 hover:text-navy transition-colors">Ver artículo ↗</a>
      </div>
    </div>`));
});

// ── VISUALIZADOR ──────────────────────────────
$('viz-title').textContent    = D.visualizer.title;
$('viz-subtitle').textContent = D.visualizer.subtitle;
$('viz-note').textContent     = D.visualizer.note;
D.visualizer.layers.forEach((app, idx) => {
  const btn = el('button','px-4 py-2 text-sm font-medium rounded-lg border transition-colors shiny-btn', app.label);
  btn.style.borderColor = app.color + '60';
  btn.addEventListener('click', () => {
    document.querySelectorAll('.shiny-btn').forEach(b => { b.style.background=''; b.style.color='#6b7280'; });
    btn.style.background = app.color + '18'; btn.style.color = app.color;
    $('shiny-desc').textContent = app.description;
    const frame = $('shiny-frame');
    if (app.shiny_url) {
      frame.removeAttribute('srcdoc'); frame.src = app.shiny_url;
    } else {
      frame.src = 'about:blank';
      frame.srcdoc = `<html><body style="margin:0;display:flex;align-items:center;justify-content:center;height:620px;font-family:sans-serif;background:#f8fafc;flex-direction:column;gap:14px;">
        <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="${app.color}" stroke-width="1.5" stroke-linecap="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
        <p style="font-size:15px;font-weight:600;color:#1e3a8a;margin:0">${app.label}</p>
        <p style="font-size:12px;color:#6b7280;text-align:center;max-width:340px;line-height:1.6;margin:0">App Shiny próximamente disponible.<br>Agrega la URL en <code style="background:#e5e7eb;padding:2px 6px;border-radius:4px">data.js → shiny_url</code></p>
      </body></html>`;
    }
  });
  $('shiny-btns').appendChild(btn);
  if (idx === 0) btn.click();
});

// ── FOOTER ────────────────────────────────────
const fe = $('footer-email');
fe.textContent = D.contact.email; fe.href = `mailto:${D.contact.email}`;
$('footer-address').textContent = D.contact.address;
$('footer-linkedin').href = D.contact.linkedin     || '#';
$('footer-scholar').href  = D.contact.scholar      || D.publications.scholar_url || '#';
$('footer-rg').href       = D.contact.researchgate || '#';
$('footer-github').href   = D.contact.github       || '#';
$('footer-year').textContent = new Date().getFullYear();

// Lucide solo para íconos dentro del contenido (líneas de investigación, nav, publicaciones)
lucide.createIcons();
setTimeout(() => lucide.createIcons(), 300);
</script>

</body>
</html>
